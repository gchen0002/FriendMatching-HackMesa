<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Mesa</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #FFFFFF;
    --paper: #F6F6F6;
    --ink: #000000;
    --ink-2: #555555;
    --mute: #9A9A9A;
    --line: #E6E6E6;
    --line-2: #D0D0D0;
    --white: #FFFFFF;
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background: var(--bg); color: var(--ink); font-family: 'Inter', system-ui, sans-serif; }
  body { font-size: 15px; line-height: 1.55; }

  .serif { font-family: 'Fraunces', Georgia, 'Times New Roman', serif; font-optical-sizing: auto; font-variation-settings: "opsz" 144; }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }

  button { font-family: inherit; cursor: pointer; }
  a { color: inherit; }

  #app { min-height: 100vh; }
  .page { animation: fade .3s ease both; }
  @keyframes fade { from { opacity:0; } to {opacity:1;} }

  /* Typewriter cursor blink */
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* Floating bubble paths */
  @keyframes floatA {
    0%   { transform: translate(0,0) rotate(0deg); }
    25%  { transform: translate(30px,-20px) rotate(2deg); }
    50%  { transform: translate(-10px,-40px) rotate(-1deg); }
    75%  { transform: translate(-30px,-10px) rotate(3deg); }
    100% { transform: translate(0,0) rotate(0deg); }
  }
  @keyframes floatB {
    0%   { transform: translate(0,0) rotate(0deg); }
    25%  { transform: translate(-25px,15px) rotate(-2deg); }
    50%  { transform: translate(15px,35px) rotate(1.5deg); }
    75%  { transform: translate(20px,-15px) rotate(-3deg); }
    100% { transform: translate(0,0) rotate(0deg); }
  }

  /* Fade-up for sequenced content reveal */
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to   { opacity:1; transform: translateY(0); }
  }

  .eyebrow { font-size: 11px; letter-spacing: .18em; text-transform: uppercase; color: var(--ink-2); font-weight: 500; }
  .mono-tag { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-2); letter-spacing: .02em; }

  .btn {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 14px 22px; border-radius: 0; border: 1px solid var(--ink);
    background: var(--ink); color: var(--white);
    font-weight: 500; font-size: 14px; letter-spacing: .01em;
    transition: background .15s ease, color .15s ease;
  }
  .btn:hover { background: var(--white); color: var(--ink); }
  .btn.ghost { background: transparent; color: var(--ink); }
  .btn.ghost:hover { background: var(--ink); color: var(--white); }
  .btn.sm { padding: 9px 16px; font-size: 13px; }

  .chip {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 12px; border-radius: 0;
    border: 1px solid var(--line-2); background: var(--white);
    font-size: 12px; color: var(--ink-2);
  }
  .chip.on { background: var(--ink); color: var(--white); border-color: var(--ink); }

  .nav {
    display: flex; justify-content: space-between; align-items: center;
    padding: 22px 48px; border-bottom: 1px solid var(--line);
    background: var(--bg); position: sticky; top:0; z-index: 20;
  }
  .brand { display:flex; align-items: baseline; gap: 10px; text-decoration: none; color: inherit; }
  .brand-mark { font-family: 'Fraunces', serif; font-weight: 400; font-size: 26px; letter-spacing: -.01em; }
  .brand-mark em { font-style: normal; color: var(--ink-2); }
  .brand-sub { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--mute); text-transform: uppercase; letter-spacing: .2em; }
  .nav-links { display:flex; gap: 32px; font-size: 14px; }
  .nav-links a { color: var(--ink-2); text-decoration: none; }
  .nav-links a:hover { color: var(--ink); }
  .nav-right { display:flex; gap: 10px; align-items: center; }

  .mono-avatar {
    display: inline-flex; align-items: center; justify-content: center;
    font-family: 'Fraunces', serif; font-weight: 400;
    color: var(--ink); border: 1px solid var(--line-2);
    background: var(--white);
    flex-shrink: 0;
  }

  .ph {
    background-image: repeating-linear-gradient(135deg, rgba(0,0,0,.05) 0 2px, transparent 2px 10px);
    background-color: var(--paper);
    border: 1px solid var(--line);
    display: flex; align-items: flex-end; padding: 14px;
    font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--ink-2);
    text-transform: uppercase; letter-spacing: .15em;
  }

  .landing-screen {
    height: 100vh; display: grid; grid-template-rows: auto 1fr auto;
    overflow: hidden;
  }

  /* Hero wrapper: full-viewport with bubble background */
  .landing-hero-wrap {
    position: relative;
    min-height: calc(100vh - 78px);
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Floating bubble field */
  .bubble-field {
    position: absolute;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }
  .bubble {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    animation-timing-function: ease-in-out;
    animation-iteration-count: infinite;
    will-change: transform;
    opacity: 0;
    animation-fill-mode: both;
  }
  .bubble img {
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: 50%;
    border: 1px solid var(--line);
    background: var(--paper);
    box-shadow: 0 4px 24px rgba(0,0,0,.06);
  }
  .bubble-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--mute);
    letter-spacing: .05em;
    text-align: center;
    white-space: nowrap;
  }

  /* Bubble fade-in then float */
  @keyframes bubbleIn {
    0% { opacity: 0; transform: scale(.8) translateY(20px); }
    100% { opacity: .7; transform: scale(1) translateY(0); }
  }

  /* Hero content: centered over bubbles */
  .landing-hero-content {
    position: relative;
    z-index: 1;
    text-align: center;
    max-width: 760px;
    padding: 0 48px;
    background: radial-gradient(ellipse at center, rgba(255,255,255,.88) 0%, rgba(255,255,255,.6) 50%, transparent 72%);
  }
  .landing-hero-content h1 {
    font-family: 'Fraunces', serif;
    font-weight: 350;
    font-size: 80px; line-height: 1.02; letter-spacing: -.025em;
    margin: 20px 0 0;
    color: var(--ink);
    text-shadow: 0 0 40px var(--bg), 0 0 80px var(--bg);
    min-height: 170px;
  }
  .typewriter-cursor::after {
    content: '|';
    font-family: 'JetBrains Mono', monospace;
    font-weight: 300;
    animation: blink .8s step-end infinite;
    color: var(--ink);
    margin-left: 2px;
  }
  .typewriter-done::after { display: none; }

  .landing-hero-content .lede {
    margin: 24px auto 0; font-size: 17px; color: var(--ink-2);
    max-width: 480px; line-height: 1.55;
    opacity: 0;
  }
  .landing-hero-content .ctas {
    margin-top: 32px; display: flex; gap: 12px;
    align-items: center; justify-content: center;
    opacity: 0;
  }
  .lede-enter { animation: fadeUp .6s ease both; }
  .ctas-enter { animation: fadeUp .6s ease .15s both; }

  .landing-steps { display: none; }
  .landing-right {
    display: grid; gap: 16px;
  }
  .step-row {
    display: grid; grid-template-columns: 44px 1fr; gap: 16px; align-items: flex-start;
    padding: 18px 0;
    border-bottom: 1px solid var(--line);
  }
  .step-row:last-child { border-bottom: 0; }
  .step-row .num {
    font-family: 'Fraunces', serif; font-size: 28px; font-weight: 300; color: var(--ink);
    line-height: 1;
  }
  .step-row h4 {
    font-family: 'Fraunces', serif; font-weight: 400; font-size: 22px;
    margin: 0 0 6px; line-height: 1.15;
  }
  .step-row p { margin: 0; font-size: 13.5px; color: var(--ink-2); line-height: 1.5; }

  .landing-foot {
    padding: 16px 48px; border-top: 1px solid var(--line);
    display: flex; justify-content: space-between; align-items: center;
    font-size: 12px; color: var(--ink-2);
    gap: 12px;
    flex-wrap: wrap;
  }

  .auth {
    display: grid; grid-template-columns: 1fr 1fr; min-height: calc(100vh - 78px);
  }
  .auth-copy { padding: 80px 56px; border-right: 1px solid var(--line); }
  .auth-copy h1 { font-family: 'Fraunces', serif; font-weight: 350; font-size: 68px; line-height: 1; letter-spacing: -.02em; margin: 12px 0 24px; }
  .auth-copy p { max-width: 360px; color: var(--ink-2); }

  .auth-form { padding: 80px 64px; display: flex; flex-direction: column; justify-content: center; max-width: 560px; }
  .auth-tabs { display: flex; gap: 0; border: 1px solid var(--ink); width: fit-content; margin-bottom: 32px; }
  .auth-tabs button { border: 0; background: transparent; padding: 10px 20px; font-size: 13px; color: var(--ink); }
  .auth-tabs button.on { background: var(--ink); color: var(--white); }

  .field { display: flex; flex-direction: column; gap: 8px; margin-bottom: 18px; }
  .field label { font-size: 12px; color: var(--ink-2); font-weight: 500; letter-spacing: .02em; }
  .field input {
    border: 0; border-bottom: 1px solid var(--line-2); background: transparent;
    padding: 12px 0; font-size: 16px; font-family: inherit; color: var(--ink);
    outline: none; transition: border-color .2s ease;
  }
  .field input:focus { border-color: var(--ink); }

  .divider { display:flex; align-items: center; gap: 14px; margin: 24px 0 20px; color: var(--mute); font-size: 11px; text-transform: uppercase; letter-spacing: .2em; }
  .divider::before, .divider::after { content:''; flex:1; height: 1px; background: var(--line); }

  .quiz {
    height: calc(100vh - 78px);
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  /* Smooth progress bar at top */
  .quiz-bar {
    width: 100%; height: 3px; background: var(--line);
    flex-shrink: 0;
  }
  .quiz-bar-fill {
    height: 100%; background: var(--ink);
    transition: width .45s cubic-bezier(.4, 0, .2, 1);
  }

  /* Centered quiz body */
  .quiz-body {
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 0 48px;
    max-width: 720px;
    margin: -24px auto 0;
    width: 100%;
    position: relative;
  }

  /* Slide-in animation for question transitions */
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(24px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  .quiz-slide {
    animation: slideIn .3s ease both;
    width: 100%;
  }

  .quiz-body h2 {
    font-family: 'Fraunces', serif;
    font-weight: 350;
    font-size: 56px; line-height: 1.08;
    margin: 0 0 40px;
    letter-spacing: -.02em;
    color: var(--ink);
    text-align: center;
  }

  /* 2-column option grid */
  .quiz-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    width: 100%;
  }
  .q-option {
    padding: 24px 20px;
    border: 1px solid var(--line);
    border-radius: 14px;
    background: var(--white);
    text-align: left;
    font-family: 'Inter', sans-serif;
    font-size: 16px; font-weight: 500;
    color: var(--ink);
    transition: border-color .2s ease, background .2s ease, transform .15s ease;
    cursor: pointer;
    width: 100%;
    line-height: 1.35;
  }
  .q-option:hover {
    border-color: var(--ink);
    background: var(--paper);
    transform: translateY(-1px);
  }
  .q-option.sel {
    background: var(--ink); color: var(--white); border-color: var(--ink);
    transform: scale(.98);
  }

  /* Back button below options */
  .quiz-back {
    margin-top: 32px;
    display: flex; align-items: center; gap: 8px;
    background: none; border: none;
    font-family: inherit; font-size: 14px;
    color: var(--mute);
    cursor: pointer;
    transition: color .15s ease;
    padding: 8px 16px;
  }
  .quiz-back:hover { color: var(--ink); }

  .results { padding: 56px 48px; }
  .results-head { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 36px; gap: 20px; }
  .results-head h1 { font-family: 'Fraunces', serif; font-weight: 350; font-size: 56px; line-height: 1; margin: 10px 0 0; letter-spacing: -.015em; max-width: 720px; }
  .filters { display:flex; gap: 8px; margin-bottom: 28px; flex-wrap: wrap; }

  .result-list { display: grid; gap: 0; border-top: 1px solid var(--line); }
  .result {
    display: grid; grid-template-columns: 60px 200px 1fr auto; gap: 28px;
    padding: 24px 0;
    align-items: center;
    border-bottom: 1px solid var(--line);
    position: relative;
    transition: background .15s ease;
  }
  .result:hover { background: var(--paper); padding-left: 16px; padding-right: 16px; }
  .result.saved { background: var(--paper); padding-left: 16px; padding-right: 16px; }
  .result .rank { font-family: 'Fraunces', serif; font-weight: 300; font-size: 48px; color: var(--ink); line-height: 1; }
  .result .ph { height: 120px; }
  .result .info { display: flex; flex-direction: column; gap: 8px; }
  .result .info h3 { font-family: 'Fraunces', serif; font-weight: 400; font-size: 28px; margin: 0; line-height: 1.05; }
  .result .info .loc { font-size: 13px; color: var(--ink-2); }
  .result .info .why { font-size: 13.5px; color: var(--ink-2); max-width: 560px; }
  .result .info .tags { display:flex; gap: 6px; flex-wrap: wrap; }
  .result .score {
    text-align: right; min-width: 140px;
    display: flex; flex-direction: column; gap: 10px; align-items: flex-end;
  }
  .result .score .n {
    font-family: 'Fraunces', serif; font-weight: 300; font-size: 44px; line-height: 1;
  }
  .result .score .n .pct { font-size: 18px; color: var(--ink-2); }
  .result .score .lab { font-size: 11px; text-transform: uppercase; letter-spacing: .2em; color: var(--ink-2); }
  .result .score .row { display: flex; gap: 6px; }
  .icon-btn {
    width: 36px; height: 36px; border: 1px solid var(--line-2); background: var(--white);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; color: var(--ink-2);
    transition: all .15s ease;
  }
  .icon-btn:hover, .icon-btn.on { background: var(--ink); border-color: var(--ink); color: var(--white); }

  .selection { max-width: 1200px; margin: 0 auto; padding: 64px 48px; }
  .selection h1 {
    font-family: 'Fraunces', serif; font-weight: 350; font-size: 56px; line-height: 1.02;
    letter-spacing: -.02em; margin: 12px 0 0;
    max-width: 760px;
  }
  .selection .sub { margin: 18px 0 0; max-width: 520px; color: var(--ink-2); font-size: 15px; }
  .sel-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 20px; margin-top: 36px; }
  .sel-card {
    position: relative; border: 1px solid var(--line); background: var(--white); padding: 16px;
    cursor: pointer; transition: border-color .15s ease, background .15s ease, transform .15s ease;
  }
  .sel-card:hover { border-color: var(--ink); transform: translateY(-2px); }
  .sel-card.on { border-color: var(--ink); background: var(--paper); }
  .sel-card h4 { font-family: 'Fraunces', serif; font-weight: 400; font-size: 28px; line-height: 1.08; margin: 16px 0 8px; }
  .sel-card .meta { display: flex; justify-content: space-between; gap: 12px; margin-bottom: 10px; font-size: 13px; color: var(--ink-2); }
  .sel-card .check {
    position: absolute; top: 26px; right: 26px; width: 32px; height: 32px;
    border: 1px solid var(--line-2); background: var(--white);
    display: flex; align-items: center; justify-content: center;
  }
  .sel-card.on .check { background: var(--ink); color: var(--white); border-color: var(--ink); }
  .sel-footer {
    margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--line);
    display: flex; justify-content: space-between; align-items: center; gap: 20px;
  }

  .friends { display: grid; grid-template-columns: 320px 1fr; gap: 32px; padding: 56px 48px; }
  .friends-side { display: flex; flex-direction: column; gap: 18px; position: sticky; top: 102px; align-self: start; }
  .friends-side h4 { font-family: 'Fraunces', serif; font-weight: 400; font-size: 34px; line-height: 1.05; margin: 12px 0 0; }
  .f-block { border: 1px solid var(--line); background: var(--white); padding: 20px; }
  .mini-schools { display: flex; flex-direction: column; gap: 8px; }
  .mini-school { display: flex; align-items: center; gap: 10px; font-size: 14px; }
  .mini-school .dot { width: 8px; height: 8px; background: var(--ink); display: inline-block; }

  .friends-main { display: grid; grid-template-columns: minmax(0, 1fr) 240px; gap: 24px; align-items: start; }
  .friend-card { border: 1px solid var(--line); background: var(--white); }
  .hero-img { position: relative; height: 460px; }
  .hero-img .ph { height: 100%; }
  .pill, .match {
    position: absolute; top: 18px; padding: 8px 12px; background: var(--white); border: 1px solid var(--line-2);
    font-size: 11px; letter-spacing: .08em; text-transform: uppercase;
  }
  .pill { left: 18px; }
  .match { right: 18px; }
  .overlay {
    position: absolute; inset: auto 0 0 0; padding: 24px;
    background: linear-gradient(180deg, rgba(255,255,255,0) 0%, rgba(255,255,255,.88) 45%, rgba(255,255,255,1) 100%);
  }
  .overlay .age { font-size: 13px; color: var(--ink-2); margin-bottom: 6px; }
  .overlay h2 { font-family: 'Fraunces', serif; font-weight: 400; font-size: 38px; line-height: 1; margin: 0; }
  .bio, .section-row, .compat { border-top: 1px solid var(--line); padding: 20px 24px; background: var(--white); }
  .bio p { font-family: 'Fraunces', serif; font-size: 24px; line-height: 1.3; margin: 12px 0 0; }
  .section-row .tags { margin-top: 12px; display: flex; gap: 6px; flex-wrap: wrap; }
  .compat { display: grid; grid-template-columns: 24px 1fr; gap: 12px; background: var(--paper); }
  .compat .icon { font-size: 24px; line-height: 1; }
  .compat .txt { font-size: 14px; color: var(--ink-2); }
  .actions-bar {
    padding: 20px 24px; border-top: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; gap: 16px;
  }
  .actions-bar .lbl { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-2); letter-spacing: .12em; text-transform: uppercase; }
  .actions-bar .btns { display: flex; gap: 10px; }
  .act-btn {
    width: 48px; height: 48px; border: 1px solid var(--line-2);
    background: var(--white); display: flex; align-items: center; justify-content: center;
    font-size: 20px; color: var(--ink-2);
    transition: all .15s ease;
  }
  .act-btn:hover { background: var(--paper); border-color: var(--ink); color: var(--ink); }
  .act-btn.like { background: var(--ink); color: var(--white); border-color: var(--ink); width: 56px; height: 56px; }
  .act-btn.like:hover { background: var(--white); color: var(--ink); border-color: var(--ink); }

  .friend-card.v-polaroid { padding: 14px 14px 20px; background: var(--white); }
  .friend-card.v-polaroid .hero-img { height: 440px; border: 1px solid var(--line); }
  .friend-card.v-polaroid .hero-img .overlay, .friend-card.v-polaroid .hero-img .pill, .friend-card.v-polaroid .hero-img .match { display: none; }
  .friend-card.v-polaroid .pola-head { padding: 16px 10px 8px; }
  .friend-card.v-polaroid .pola-head h2 { font-family: 'Fraunces', serif; font-weight: 400; font-size: 32px; margin: 0; line-height: 1.05; }
  .friend-card.v-polaroid .pola-head .m { font-size: 12.5px; color: var(--ink-2); margin-top: 4px; font-family: 'JetBrains Mono', monospace; }
  .friend-card.v-polaroid .bio, .friend-card.v-polaroid .section-row, .friend-card.v-polaroid .compat { border: 0; padding: 10px 10px; background: transparent; }
  .friend-card.v-polaroid .bio p { font-size: 17px; }

  .friend-card.v-structured .hero-img { height: 280px; }
  .friend-card.v-structured .hero-img .overlay { display: none; }
  .friend-card.v-structured .stat-head { padding: 22px 24px 14px; border-bottom: 1px solid var(--line); }
  .friend-card.v-structured .stat-head h2 { font-family: 'Fraunces', serif; font-weight: 400; font-size: 32px; margin: 0; line-height: 1; }
  .friend-card.v-structured .stat-head .m { margin-top: 6px; font-size: 13px; color: var(--ink-2); }
  .friend-card.v-structured .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0; border-bottom: 1px solid var(--line); }
  .friend-card.v-structured .stat-grid > div { padding: 16px 24px; border-right: 1px solid var(--line); }
  .friend-card.v-structured .stat-grid > div:nth-child(2n) { border-right: 0; }
  .friend-card.v-structured .stat-grid .k { font-size: 11px; letter-spacing: .18em; text-transform: uppercase; color: var(--ink-2); margin-bottom: 4px; }
  .friend-card.v-structured .stat-grid .v { font-family: 'Fraunces', serif; font-size: 17px; }

  .friend-deck-info { display: flex; flex-direction: column; gap: 16px; min-width: 240px; }
  .friend-deck-info .queue { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-2); letter-spacing: .1em; }
  .friend-deck-info .hint { font-size: 13px; color: var(--ink-2); max-width: 240px; line-height: 1.5; }
  .variant-toggle { display: flex; gap: 0; border: 1px solid var(--ink); width: fit-content; }
  .variant-toggle button { border: 0; background: transparent; padding: 8px 14px; font-size: 12px; color: var(--ink); cursor: pointer; border-right: 1px solid var(--ink); }

  .posts { padding: 56px 48px; }

  .posts-grid { display: grid; grid-template-columns: 1.1fr 2fr; gap: 40px; align-items: flex-start; }

    display: flex; flex-direction: column; gap: 14px;
    position: sticky; top: 102px;

  .compose h3 { font-family: 'Fraunces', serif; font-weight: 400; font-size: 26px; margin: 0; }

  .compose input, .compose textarea, .compose select {

  }
  .compose input:focus, .compose textarea:focus, .compose select:focus { border-color: var(--ink); }
  .compose textarea { font-family: 'Fraunces', serif; font-size: 18px; line-height: 1.35; min-height: 80px; }
  .compose .tag-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .compose .tag-row .chip { cursor: pointer; }

  .post-list { display: grid; gap: 0; border-top: 1px solid var(--line); }
  .post {
    padding: 28px 0; display: grid; grid-template-columns: auto 1fr auto; gap: 20px;
    align-items: flex-start;
    border-bottom: 1px solid var(--line);

  .post:hover { background: var(--paper); padding-left: 16px; padding-right: 16px; }
  .post .mono-avatar { width: 48px; height: 48px; font-size: 16px; }

  .post .body .meta { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--mute); letter-spacing: .1em; text-transform: uppercase; display: flex; gap: 14px; }
  .post .body .meta span { display: inline-flex; align-items: center; gap: 6px; }
  .post .body .tags { margin-top: 12px; display: flex; gap: 6px; flex-wrap: wrap; }
  .post .actions { display: flex; gap: 6px; }

  .tweaks {
    position: fixed; bottom: 24px; right: 24px; z-index: 50;
    width: 320px; background: var(--white); border: 1px solid var(--ink);
    padding: 20px; display: none; flex-direction: column; gap: 16px;
  }
  .tweaks.show { display: flex; }
  .tweaks h5 { font-family: 'Fraunces', serif; font-weight: 400; font-size: 18px; margin: 0; display:flex; justify-content: space-between; align-items: center; }
  .tweaks h5 button { border: 0; background: transparent; cursor: pointer; color: var(--ink-2); font-size: 18px; }
  .tweaks .group { display: flex; flex-direction: column; gap: 8px; }
  .tweaks .group .k { font-size: 11px; letter-spacing: .18em; text-transform: uppercase; color: var(--ink-2); }
  .tweaks .opts { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0; border: 1px solid var(--ink); }
  .tweaks .opts button {
    padding: 10px 8px; border: 0; background: var(--white); border-right: 1px solid var(--ink);
    font-family: inherit; font-size: 12px; cursor: pointer; color: var(--ink);
  }
  .tweaks .opts button:last-child { border-right: 0; }
  .tweaks .opts button.on { background: var(--ink); color: var(--white); }

  .spacer { flex: 1; }

  @media (max-width: 1100px) {
    .auth, .posts-grid, .friends, .friends-main { grid-template-columns: 1fr; }
    .friends-side, .compose { position: static; }
    .sel-grid { grid-template-columns: 1fr 1fr; }
    .result { grid-template-columns: 50px 160px 1fr; }
    .result .score { grid-column: 2 / -1; align-items: flex-start; text-align: left; min-width: 0; }
    .landing-hero-content h1 { font-size: 64px; min-height: 140px; }
    .bubble.hide-tablet { display: none; }
  }

  @media (max-width: 760px) {
    .nav, .auth-copy, .auth-form,
    .results, .selection, .friends, .posts, .landing-foot { padding-left: 20px; padding-right: 20px; }
    .nav { flex-wrap: wrap; gap: 16px; }
    .nav-links { gap: 16px; flex-wrap: wrap; }
    .landing-hero-content h1, .auth-copy h1, .results-head h1, .selection h1, .posts-head h1 { font-size: 42px; }
    .landing-hero-content h1 { min-height: 100px; }
    .landing-hero-content { padding: 0 20px; }
    .landing-hero-content .lede { font-size: 15px; }
    .bubble { opacity: .5 !important; }
    .bubble.hide-mobile { display: none; }
    .quiz-body { padding: 0 20px; }
    .quiz-body h2 { font-size: 32px; margin-bottom: 24px; }
    .quiz-options { grid-template-columns: 1fr; gap: 10px; }
    .q-option { padding: 18px 16px; font-size: 15px; }
    .results-head, .sel-footer, .posts-head { flex-direction: column; align-items: flex-start; }
    .result { grid-template-columns: 1fr; gap: 16px; }
    .result .rank { font-size: 36px; }
    .sel-grid { grid-template-columns: 1fr; }
    .hero-img, .friend-card.v-polaroid .hero-img { height: 320px; }
    .overlay h2 { font-size: 30px; }
    .posts-grid { gap: 24px; }
    .post { grid-template-columns: auto 1fr; }
    .post .actions { grid-column: 2; }
    .tweaks { width: calc(100vw - 40px); right: 20px; bottom: 20px; }
  }
</style>
</head>
